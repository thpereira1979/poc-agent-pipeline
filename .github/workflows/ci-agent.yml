name: CI - Agente Copilot de Análise de Erros

on:
  push:
    paths:
      - "src/**"
    branches:
      - main
      - "feature/**"
  pull_request:
    paths:
      - "src/**"
    branches:
      - main

permissions:
  contents: read
  copilot-requests: write

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Configurar Node.js (para Copilot CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Copilot CLI
        run: npm install -g @github/copilot

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Executar testes
        id: tests
        continue-on-error: true
        run: |
          pytest tests/ -v --tb=long 2>&1 | tee test_output.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Verificar resultado dos testes
        id: check
        run: |
          if grep -q "FAILED\|ERROR" test_output.log; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi

      - name: Preparar prompt para Copilot
        if: steps.check.outputs.has_errors == 'true'
        run: |
          cat <<'PROMPT_EOF' > copilot_prompt.txt
          Você é um engenheiro de software sênior especialista em Python.
          Analise o log de erro de testes abaixo e forneça:
          1) Um resumo claro do que falhou
          2) A causa raiz provável
          3) Sugestão de correção
          Seja direto e objetivo. Responda em português brasileiro.

          === LOG DE ERRO ===
          PROMPT_EOF
          cat test_output.log >> copilot_prompt.txt

      - name: Analisar erro com Copilot CLI
        if: steps.check.outputs.has_errors == 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          PROMPT=$(cat copilot_prompt.txt)
          copilot -p "$PROMPT" --no-ask-user > copilot_analysis.txt 2>&1 || true
          echo "--- ANÁLISE DO COPILOT ---"
          cat copilot_analysis.txt

      - name: Salvar análise como artifact
        if: steps.check.outputs.has_errors == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: copilot-analysis
          path: |
            copilot_analysis.txt
            test_output.log
          retention-days: 30

      - name: Enviar notificação para Teams
        if: steps.check.outputs.has_errors == 'true'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: python agent/notify_teams.py

      - name: Falhar pipeline se testes falharam
        if: steps.check.outputs.has_errors == 'true'
        run: |
          echo "❌ Testes falharam. Análise do Copilot enviada ao Teams."
          exit 1
